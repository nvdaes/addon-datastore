name: remove codeQl keys for add-ons metadata

on:
  workflow_dispatch:

jobs:
  removeCodeQl:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    outputs:
      has_changes: ${{ steps.detect_changes.outputs.has_changes }}
    steps:
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Remove codeQl keys from add-ons metadata
        shell: bash
        run: ./remove-codeql-keys.sh

      - name: Detect staged changes
        id: detect_changes
        shell: bash
        run: |
          git add addons
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes found"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      - name: Upload addons folder as an artifact
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: addons
          path: addons

  createPullRequest:
    runs-on: ubuntu-latest
    needs: removeCodeQl
    if: needs.removeCodeQl.outputs.has_changes == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Download addons folder artifact
        uses: actions/download-artifact@v8
        with:
          name: addons
          path: addons

      - name: Commit changes and create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          BRANCH="remove-codeql-keys-${{ github.run_id }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "$BRANCH"
          git add addons
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Remove codeQl keys from add-ons metadata"
          git push origin "$BRANCH"
          gh pr create \
            --title "Remove codeQl keys from add-ons metadata" \
            --body "This PR removes codeQl keys from add-ons metadata." \
            --base master \
            --head "$BRANCH"
